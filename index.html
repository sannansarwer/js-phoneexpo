<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Expo</title>
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--Custom CSS-->
    <link href="style.css" rel="stylesheet">
</head>
<body>

<!-- Responsive Navbar -->  
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <span class="badge text-bg-primary me-3">Phone ExpO</span>
    
    <!-- Hamburger toggler -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
      aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarContent">
      <form class="d-flex w-100 mt-2 mt-lg-0" role="search" id="search-form">
        <input class="form-control me-2 flex-grow-1" id="search-input" type="search" placeholder="Search" aria-label="Search"/>
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>
<br>

<!-- Responsive Dropdown Buttons -->
<div class="d-flex flex-column flex-sm-row gap-2 justify-content-start mb-3 px-2">
    <!-- Dropdown 1 -->
    <div class="dropdown">
        <a class="btn btn-sm btn-secondary dropdown-toggle w-100 w-sm-auto" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            I Phone
        </a>
        <ul class="dropdown-menu" id="iphone-menu"></ul>
    </div>

    <!-- Dropdown 2 -->
    <div class="dropdown">
        <a class="btn btn-sm btn-secondary dropdown-toggle w-100 w-sm-auto" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Samsung
        </a>
        <ul class="dropdown-menu" id="samsung-menu"></ul>
    </div>

    <!-- Dropdown 3 -->
    <div class="dropdown">
        <a class="btn btn-sm btn-secondary dropdown-toggle w-100 w-sm-auto" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Xiaomi
        </a>
        <ul class="dropdown-menu" id="xiaomi-menu"></ul>
    </div>
</div>

<!-- Responsive Product Cards -->
<div class="container">
  <div class="row" id="product-container">
    <!-- Example card -->
    <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4">
      <div class="card h-100">
        <img src="phone.jpg" class="card-img-top img-fluid" alt="Phone">
        <div class="card-body">
          <h5 class="card-title">iPhone 14</h5>
          <p class="card-text">$799</p>
        </div>
      </div>
    </div>
    <!-- More cards will be dynamically added via JS -->
  </div>
</div>

<!--Custom JS-->
<script src="script.js"></script>
<!--Bootstrap JS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
